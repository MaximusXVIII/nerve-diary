name: Update README timestamp

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          DAY=$(date -u +"%-d")
          MONTH=$(date -u +"%B")
          TIME=$(date -u +"%H:%M:%S")

          # Work out ordinal suffix (st, nd, rd, th)
          if [[ "$DAY" == "11" || "$DAY" == "12" || "$DAY" == "13" ]]; then
            SUFFIX="th"
          else
            case "${DAY: -1}" in
              1) SUFFIX="st" ;;
              2) SUFFIX="nd" ;;
              3) SUFFIX="rd" ;;
              *) SUFFIX="th" ;;
            esac
          fi

          DATE_STR="${DAY}${SUFFIX} ${MONTH} ${TIME} UTC"
          sed -i "s|<!--LAST_UPDATED-->.*|<!--LAST_UPDATED-->Last updated: $DATE_STR|" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update last-updated timestamp [skip ci]"
          git push
